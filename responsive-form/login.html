<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>User Login Validation</title>
    <style>
    *{
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      }
    body{
          height: 100vh;
          display: flex;
          justify-content: center;
          align-items: center;
          background: #f2f2f2;
          font-family: Arial, Helvetica, sans-serif;
    }
    form{
          background: #fff;
          padding: 30px;     
          border-radius: 10px;
          width: 50%;
          height: 70%;
          box-shadow: 0 0 10px rgba(0,0,0,0.1);
          display: flex;
          flex-direction: column;
          justify-content: center;
          align-items: center;
    }
    label{
      margin-bottom: 3%;
    }
    input{
          display: block;
          margin-bottom: 20px;
          padding: 10px;
          width:100%;
          border: 1px solid #ccc;
          border-radius: 5px;
          margin-top: -2%;
    }
    button{
          background: #2f7c11;
          color: #fff;
          border: none;
          border-radius: 20px;
          cursor: pointer;
          padding: 5% 10%;
          font-size: 90%;
          width: 45%;
          justify-content: space-around;
    }
    #btnd{
      background-color: red;
    }
    #msg{
          margin-top: 10px;
          margin-bottom: 10px;
      }

    .box1, .box2{
          display: flex;
          flex-direction: row;
          gap: 5px;
          width: 80%;
    }
    .btn{
      
      width: 50%;
    }
    @media (max-width: 650px){
      .box1, .box2{
            flex-direction: column;
            transition: 0.5s ease-in-out;
      }
      form{
            padding: 30px 10px;
      }
    }
    </style>
  </head>
  <body>
    <form action="">
        <div class="box1">
            <label for="">Username</label>
            <input type="text" placeholder="Username" id="inp1">
        </div>
        <div class="box2">
            <label for="">Password</label>
            <input type="password" placeholder="Password" id="inp2">

        </div>

        <p id="msg"></p>      

        <div class="btn">
              <button type="submit" id="btn" >Submit</button>
              <button type="reset" id="btnd" >Reset</button>
        </div>
    </form>
  <script src="login.js"></script>
  </body>
</html>
